# ── HiveOS Docker Compose ─────────────────────────────────────────
# ADR-0008: on-premise default — single service, local data.
#
# Quick start:
#   docker compose up -d
#   docker compose logs -f
#
# Stop:
#   docker compose down
#
# Data persists in: named volume → /data (container)
# ──────────────────────────────────────────────────────────────────

services:
  hiveos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hiveos
    restart: unless-stopped
    ports:
      - "${HIVEOS_PORT:-8080}:8080"
    volumes:
      - hiveos-data:/data
    environment:
      - HIVEOS_HOST=0.0.0.0
      - HIVEOS_PORT=8080
      - HIVEOS_DATA_DIR=/data
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  hiveos-data:
    driver: local
