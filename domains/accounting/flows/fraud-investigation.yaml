# ============================================================
# Fraud Investigation — Fraud Investigation Flow
# بررسی تقلب مالی
# ============================================================
# End-to-end fraud investigation:
#   forensic-accountant → document review, red flags (parallel start)
#   auditor             → transaction review, red flags (parallel start)
#   ml-engineer         → anomaly detection (depends on forensic accountant)
#   compliance-officer  → regulatory review (depends on both forensic + auditor)
# ============================================================

name: "Fraud Investigation"
name_fa: "بررسی تقلب مالی"
description: >
  End-to-end fraud investigation workflow. The Forensic Accountant
  reviews documents and identifies red flags. The Auditor reviews
  transactions and identifies control weaknesses — both start in
  parallel. The ML/AI Engineer performs anomaly detection analysis
  on forensic data. The Compliance Officer reviews all findings
  against regulatory requirements and produces the final investigation
  report with findings and recommendations.
version: "1.0.0"
domain: "accounting"

trigger:
  type: manual

agents:
  # ── Agent 1a: Forensic Accountant (parallel start) ──
  # Document review, red flag identification, fraud indicators.
  - id: forensic-accountant
    name: "Forensic Accountant"
    name_fa: "حسابرس دادگاهی"
    role: domain agent
    skills:
      - fraud-detection
      - forensic-accounting
      - anomaly-detection
    depends_on: []
    input_from:
      files:
        - "investigation/transaction_data.json"
        - "investigation/document_evidence.json"
    output: "forensic_findings.md"
    deliver:
      format: markdown

  # ── Agent 1b: Auditor (parallel start with forensic accountant) ──
  # Transaction review, control weakness identification.
  - id: auditor
    name: "Auditor"
    name_fa: "حسابرس"
    role: domain agent
    skills:
      - audit-planning
      - audit-sampling
      - risk-assessment
      - audit-evidence
    depends_on: []
    input_from:
      files:
        - "investigation/transaction_data.json"
        - "investigation/control_matrices.json"
    output: "audit_red_flag_findings.md"
    deliver:
      format: markdown

  # ── Agent 3: ML/AI Engineer ──
  # Anomaly detection using ML models on forensic data.
  - id: ml-engineer
    name: "ML/AI Engineer"
    name_fa: "مهندس یادگیری ماشین"
    role: domain agent
    skills:
      - ml-models
      - nlp-finance
      - anomaly-detection
      - time-series
    depends_on:
      - forensic-accountant
    input_from:
      agent: forensic-accountant
      files:
        - "forensic_findings.md"
    output: "anomaly_detection_report.md"
    action:
      run_anomaly_models: true
      flag_outliers: true
    deliver:
      format: markdown

  # ── Agent 4: Compliance Officer ──
  # Regulatory review, AML screening, compliance assessment.
  - id: compliance-officer
    name: "Ethics & Compliance Officer"
    name_fa: "مسئول انطباق و اخلاق"
    role: domain agent
    skills:
      - ethics-check
      - aml-screening
      - kyc
    depends_on:
      - forensic-accountant
      - auditor
    input_from:
      agents:
        - agent: forensic-accountant
          files:
            - "forensic_findings.md"
        - agent: auditor
          files:
            - "audit_red_flag_findings.md"
    output: "fraud_investigation_report.md"
    action:
      regulatory_review: true
      include_recommendations: true
    deliver:
      format: markdown

memory:
  share_context: true
  consolidate: "flow_execution"
  trace: true

deliver:
  to: origin
  format: markdown
  include_agents: true
  include_trace: true
