# ============================================================
# Audit Engagement — Financial Audit Engagement Flow
# انجام قرارداد حسابرسی
# ============================================================
# Orchestrates a full audit engagement:
#   internal-controller → pre-audit controls review (first)
#   auditor             → substantive testing (depends on controller)
#   it-auditor          → IT controls testing (depends on controller)
#   audit-orchestrator  → consolidate, report (depends on auditor + it-auditor)
# ============================================================

name: "Audit Engagement"
name_fa: "انجام قرارداد حسابرسی"
description: >
  Full audit engagement workflow. The Internal Controller performs
  a pre-audit review of internal controls. The Auditor conducts
  substantive testing and gathers audit evidence. The IT Auditor
  performs IT controls and cybersecurity testing in parallel with
  the Auditor. The Audit Orchestrator consolidates all findings
  and produces the final audit report with opinion.
version: "1.0.0"
domain: "accounting"

trigger:
  type: manual

agents:
  # ── Agent 1: Internal Controller ──
  # Pre-audit review of internal controls, risk assessment, compliance check.
  - id: internal-controller
    name: "Internal Controller"
    name_fa: "کنترل‌گر داخلی"
    role: domain agent
    skills:
      - internal-control
      - coso-framework
      - risk-management
      - compliance
    depends_on: []
    input_from:
      files:
        - "audit/prior_year_audit_file.json"
        - "audit/internal_control_questionnaires.json"
    output: "pre_audit_controls_review.md"
    deliver:
      format: markdown

  # ── Agent 2: Auditor ──
  # Substantive testing, audit sampling, evidence collection.
  - id: auditor
    name: "Auditor"
    name_fa: "حسابرس"
    role: domain agent
    skills:
      - audit-planning
      - audit-sampling
      - risk-assessment
      - audit-evidence
      - audit-reporting
    depends_on:
      - internal-controller
    input_from:
      agent: internal-controller
      files:
        - "pre_audit_controls_review.md"
    output: "substantive_testing_findings.md"
    deliver:
      format: markdown

  # ── Agent 3: IT Auditor (parallel with Auditor) ──
  # IT controls testing, CAATs, cybersecurity audit.
  - id: it-auditor
    name: "IT Auditor"
    name_fa: "حسابرس سیستم‌های اطلاعاتی"
    role: domain agent
    skills:
      - it-audit
      - caats
      - cybersecurity-audit
      - erp-controls
    depends_on:
      - internal-controller
    input_from:
      agent: internal-controller
      files:
        - "pre_audit_controls_review.md"
    output: "it_audit_findings.md"
    deliver:
      format: markdown

  # ── Agent 4: Audit Orchestrator ──
  # Consolidates findings from both auditor and IT auditor, produces final report.
  - id: audit-orchestrator
    name: "Audit Orchestrator"
    name_fa: "هماهنگ‌کننده حسابرسی"
    role: domain agent
    skills:
      - audit-reporting
      - audit-evidence
      - compliance
    depends_on:
      - auditor
      - it-auditor
    input_from:
      agents:
        - agent: auditor
          files:
            - "substantive_testing_findings.md"
        - agent: it-auditor
          files:
            - "it_audit_findings.md"
    output: "final_audit_report.md"
    action:
      consolidate: true
      include_opinion: true
    deliver:
      format: markdown

memory:
  share_context: true
  consolidate: "flow_execution"
  trace: true

deliver:
  to: origin
  format: markdown
  include_agents: true
  include_trace: true
