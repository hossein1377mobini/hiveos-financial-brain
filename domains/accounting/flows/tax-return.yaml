# ============================================================
# Tax Return — Tax Return Preparation Flow
# تهیه اظهارنامه مالیاتی
# ============================================================
# End-to-end tax return preparation:
#   financial-reporter → prepare financial data
#   tax-specialist     → calculate taxes, fill forms
#   tax-strategist     → review, optimize, finalize
# ============================================================

name: "Tax Return Preparation"
name_fa: "تهیه اظهارنامه مالیاتی"
description: >
  End-to-end tax return preparation workflow. The Financial Reporter
  prepares the underlying financial data. The Tax Specialist calculates
  owed taxes, fills official forms, and handles applicable deductions
  and credits. The Tax Strategist reviews the return, identifies
  optimization opportunities, and finalizes both the return and an
  optimization report.
version: "1.0.0"
domain: "accounting"

trigger:
  type: manual

agents:
  # ── Agent 1: Financial Reporter ──
  # Prepares historical financial data for tax calculation.
  - id: financial-reporter
    name: "Financial Reporter"
    name_fa: "گزارش‌گر مالی"
    role: domain agent
    skills:
      - financial-statements
      - disclosures
      - cash-flow
    depends_on: []
    input_from:
      files:
        - "accounts/ytd_financials.json"
        - "accounts/tax_relevant_adjustments.json"
    output: "tax_financial_data.md"
    deliver:
      format: markdown

  # ── Agent 2: Tax Specialist ──
  # Calculates taxes, fills official forms, applies deductions.
  - id: tax-specialist
    name: "Tax Specialist"
    name_fa: "متخصص مالیاتی"
    role: domain agent
    skills:
      - tax-calculation
      - tax-return
      - vat
      - tax-litigation
    depends_on:
      - financial-reporter
    input_from:
      agent: financial-reporter
      files:
        - "tax_financial_data.md"
    output: "completed_tax_return_forms.md"
    deliver:
      format: markdown

  # ── Agent 3: Tax Strategist ──
  # Reviews, optimizes, and finalizes the tax return.
  - id: tax-strategist
    name: "Tax Strategist"
    name_fa: "استراتژیست مالیاتی"
    role: domain agent
    skills:
      - transfer-pricing
      - tax-planning
      - international-tax
    depends_on:
      - tax-specialist
    input_from:
      agent: tax-specialist
      files:
        - "completed_tax_return_forms.md"
    output: "tax_return_final_with_optimization.md"
    action:
      optimization_review: true
      finalize: true
    deliver:
      format: markdown

memory:
  share_context: true
  consolidate: "flow_execution"
  trace: true

deliver:
  to: origin
  format: markdown
  include_agents: true
  include_trace: true
