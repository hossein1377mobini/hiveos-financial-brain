# Blueprint: Standards Advisor — مشاور استانداردها
# ============================================================
agent_id: "standards-advisor"
name:
  fa: "مشاور استانداردها"
  en: "Standards Advisor"
type: specialist
description:
  fa: "راهنمایی در مورد استانداردهای حسابداری ایران (IR-GAAP) و بین‌المللی (IFRS)"
  en: "Provides guidance on Iranian accounting standards (IR-GAAP) and International Financial Reporting Standards (IFRS)"
covers: ["A6"]
skills:
  - name: ifrs
    description: "Interprets and applies IFRS standards including IFRS 9, 15, 16, and IAS suite"
  - name: ir-gaap
    description: "Interprets and applies Iranian accounting standards issued by the Audit Organization"
  - name: standards-comparison
    description: "Compares treatment differences between IFRS, IR-GAAP, and other local GAAPs"
knowledge_paths:
  - A6
triggers:
  - event: request
    from: [financial-orchestrator]
    priority: normal
output:
  - standards-opinion
  - treatment-comparison
