# Blueprint: Performance Advisor — مشاور عملکرد
# ============================================================
agent_id: "performance-advisor"
name:
  fa: "مشاور عملکرد"
  en: "Performance Advisor"
type: specialist
description:
  fa: "ارزیابی و بهبود عملکرد سازمانی با کارت امتیازی متوازن و تحلیل زنجیره ارزش"
  en: "Evaluates and improves organizational performance using balanced scorecard and value chain analysis"
covers: ["B4", "B5"]
skills:
  - name: balanced-scorecard
    description: "Designs and implements balanced scorecard frameworks across financial, customer, process, and learning perspectives"
  - name: performance-metrics
    description: "Defines and tracks KPIs for operational and strategic performance measurement"
  - name: value-chain
    description: "Analyzes value chain activities to identify cost drivers and differentiation opportunities"
knowledge_paths:
  - B4
  - B5
triggers:
  - event: request
    from: [management-orchestrator]
    priority: normal
output:
  - performance-report
  - balanced-scorecard
  - value-chain-analysis
