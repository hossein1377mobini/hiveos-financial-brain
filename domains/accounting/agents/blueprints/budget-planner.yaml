# Blueprint: Budget Planner — برنامه‌ریز بودجه
# ============================================================
agent_id: "budget-planner"
name:
  fa: "برنامه‌ریز بودجه"
  en: "Budget Planner"
type: specialist
description:
  fa: "تهیه و تحلیل بودجه‌های عملیاتی و سرمایه‌ای، پیش‌بینی مالی و ارزیابی سرمایه‌گذاری"
  en: "Prepares operational and capital budgets, financial forecasts, and investment appraisals"
covers: ["B2", "B4"]
skills:
  - name: budgeting
    description: "Prepares master budgets including sales, production, cash, and financial budgets"
  - name: forecasting
    description: "Generates financial forecasts using quantitative and qualitative methods"
  - name: capital-budgeting
    description: "Evaluates capital investment decisions using NPV, IRR, payback, and profitability index"
  - name: kpi-dashboard
    description: "Designs budget-to-actual dashboards and performance tracking frameworks"
knowledge_paths:
  - B2
  - B4
triggers:
  - event: request
    from: [management-orchestrator]
    priority: normal
output:
  - budget-report
  - financial-forecast
  - capital-budget-analysis
