# Blueprint: Ethics & Compliance Officer — مسئول انطباق و اخلاق
# ============================================================
agent_id: "compliance-officer"
name:
  fa: "مسئول انطباق و اخلاق"
  en: "Ethics & Compliance Officer"
type: specialist
description:
  fa: "بررسی اخلاقی، غربالگری AML و احراز هویت مشتری (KYC)"
  en: "Performs ethics reviews, anti-money laundering screening, and know-your-customer verification"
covers: ["H2", "H4"]
skills:
  - name: ethics-check
    description: "Evaluates transactions and business practices against ethical standards and codes of conduct"
  - name: aml-screening
    description: "Conducts anti-money laundering screening and suspicious activity monitoring"
  - name: kyc
    description: "Performs know-your-customer verification and customer due diligence processes"
knowledge_paths:
  - H2
  - H4
triggers:
  - event: request
    from: [audit-orchestrator]
    priority: normal
output:
  - compliance-report
  - aml-screening-result
  - ethics-opinion
