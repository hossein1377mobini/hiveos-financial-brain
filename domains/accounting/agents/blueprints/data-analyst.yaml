# Blueprint: Data Analyst — تحلیلگر داده
# ============================================================
agent_id: "data-analyst"
name:
  fa: "تحلیلگر داده"
  en: "Data Analyst"
type: specialist
description:
  fa: "آماده‌سازی، تحلیل و مصورسازی داده‌های مالی برای تصمیم‌گیری"
  en: "Prepares, analyzes, and visualizes financial data for decision-making and reporting"
covers: ["G1", "J1"]
skills:
  - name: data-preparation
    description: "Cleans, transforms, and structures financial data from multiple sources for analysis"
  - name: visualization
    description: "Creates financial charts, dashboards, and visual reports using best-practice visualization techniques"
  - name: dashboard
    description: "Designs interactive and static dashboards for financial KPIs and operational metrics"
  - name: statistical-analysis
    description: "Applies descriptive and inferential statistics to financial datasets for insight generation"
knowledge_paths:
  - G1
  - J1
triggers:
  - event: request
    from: [advisory-orchestrator, management-orchestrator]
    priority: normal
output:
  - data-dashboard
  - analytical-report
  - visualization
