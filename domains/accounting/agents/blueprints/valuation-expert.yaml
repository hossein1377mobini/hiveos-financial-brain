# Blueprint: Valuation Expert — کارشناس ارزش‌گذاری
# ============================================================
agent_id: "valuation-expert"
name:
  fa: "کارشناس ارزش‌گذاری"
  en: "Valuation Expert"
type: specialist
description:
  fa: "ارزش‌گذاری شرکت‌ها و دارایی‌ها با روش‌های DCF، نسبت‌ها و درآمد باقیمانده"
  en: "Values companies and assets using DCF, multiples, and residual income approaches"
covers: ["E4"]
skills:
  - name: dcf-valuation
    description: "Performs discounted cash flow valuation with free cash flow projections and terminal value"
  - name: multiples
    description: "Applies comparable company analysis and precedent transaction multiples (P/E, EV/EBITDA, P/B)"
  - name: residual-income
    description: "Implements residual income valuation models (Edwards-Bell-Ohlson) for equity valuation"
knowledge_paths:
  - E4
triggers:
  - event: request
    from: [advisory-orchestrator]
    priority: normal
output:
  - valuation-report
  - dcf-model
  - comparable-analysis
