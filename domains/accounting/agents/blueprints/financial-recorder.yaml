# Blueprint: Financial Recorder — ثبت‌کننده مالی
# ============================================================
agent_id: "financial-recorder"
name:
  fa: "ثبت‌کننده مالی"
  en: "Financial Recorder"
type: specialist
description:
  fa: "ثبت رویدادهای مالی، صدور اسناد حسابداری، اصلاحات و بستن حساب"
  en: "Records financial transactions, issues accounting documents, performs adjustments and period-end closing"
covers: ["A1", "A6"]
skills:
  - name: journal-entry
    description: "Records financial transactions in the general journal with proper double-entry bookkeeping"
  - name: reconciliation
    description: "Performs bank, receivable, and inventory reconciliations to ensure ledger accuracy"
  - name: trial-balance
    description: "Prepares and validates trial balances (unadjusted, adjusted, post-closing)"
  - name: closing-entries
    description: "Executes period-end closing entries for temporary accounts and income summary"
knowledge_paths:
  - A1
  - A6
triggers:
  - event: request
    from: [financial-orchestrator]
    priority: normal
output:
  - recorded-transactions
  - trial-balance
  - reconciled-accounts
