# Blueprint: Financial Institutions Specialist — متخصص نهادهای مالی
# ============================================================
agent_id: "financial-institutions-specialist"
name:
  fa: "متخصص نهادهای مالی"
  en: "Financial Institutions Specialist"
type: specialist
description:
  fa: "حسابداری بانک‌ها، بیمه‌ها و صندوق‌های سرمایه‌گذاری"
  en: "Specializes in accounting for banks, insurance companies, and investment funds"
covers: ["E5"]
skills:
  - name: banking-accounting
    description: "Applies specialized accounting for banks including loan loss provisioning, Basel compliance, and interest income recognition"
  - name: insurance-accounting
    description: "Manages insurance accounting including premium recognition, claims reserves, and IFRS 17 implementation"
  - name: fund-accounting
    description: "Handles investment fund accounting including NAV calculation, unit pricing, and portfolio valuation"
knowledge_paths:
  - E5
triggers:
  - event: request
    from: [advisory-orchestrator]
    priority: normal
output:
  - institutions-accounting-report
  - regulatory-filing
