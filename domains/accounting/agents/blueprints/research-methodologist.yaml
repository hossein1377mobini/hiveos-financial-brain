# Blueprint: Research Methodologist — روش‌شناس پژوهش
# ============================================================
agent_id: "research-methodologist"
name:
  fa: "روش‌شناس پژوهش"
  en: "Research Methodologist"
type: specialist
description:
  fa: "طراحی پژوهش، اقتصادسنجی و روش‌شناسی تحقیق در حسابداری"
  en: "Provides research design, econometric analysis, and research methodology expertise for accounting research"
covers: ["J3"]
skills:
  - name: research-design
    description: "Designs empirical research studies including hypothesis formulation, sampling, and variable selection"
  - name: econometrics
    description: "Applies econometric methods (regression, panel data, GMM, event studies) to accounting research"
  - name: methodology
    description: "Guides methodological choices including qualitative, quantitative, and mixed-method approaches"
knowledge_paths:
  - J3
triggers:
  - event: request
    from: [advisory-orchestrator]
    priority: normal
output:
  - research-design
  - econometric-analysis
  - methodology-guidance
