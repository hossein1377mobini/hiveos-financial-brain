# Blueprint: Management Orchestrator — هماهنگ‌کننده مدیریت
# ============================================================
agent_id: "management-orchestrator"
name:
  fa: "هماهنگ‌کننده مدیریت"
  en: "Management Orchestrator"
type: orchestrator
description:
  fa: "هماهنگی تحلیلگران هزینه، بودجه، عملکرد و استراتژی برای تصمیم‌گیری مدیریت"
  en: "Coordinates cost analysis, budgeting, performance measurement, and strategic advisory"
covers: ["B"]
sub_agents:
  - cost-analyst
  - budget-planner
  - performance-advisor
  - strategy-advisor
skills:
  - name: workflow-orchestration
    description: "Orchestrates management accounting workflows (budgeting, costing, performance analysis)"
  - name: task-decomposition
    description: "Breaks management queries into specialist tasks for cost, budget, performance, and strategy"
  - name: quality-check
    description: "Reviews management reports for internal consistency and actionable insights"
knowledge_paths:
  - B
triggers:
  - event: request
    from: [master-financial-assistant]
    priority: high
output:
  - management-report
