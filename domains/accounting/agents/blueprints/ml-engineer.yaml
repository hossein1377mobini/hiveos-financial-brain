# Blueprint: ML/AI Engineer — مهندس یادگیری ماشین
# ============================================================
agent_id: "ml-engineer"
name:
  fa: "مهندس یادگیری ماشین"
  en: "ML/AI Engineer"
type: specialist
description:
  fa: "طراحی و پیاده‌سازی مدل‌های یادگیری ماشین برای کاربردهای مالی"
  en: "Designs and implements machine learning models for financial applications including forecasting and anomaly detection"
covers: ["G2", "G3", "J2"]
skills:
  - name: ml-models
    description: "Builds and trains supervised/unsupervised ML models for financial prediction and classification"
  - name: nlp-finance
    description: "Applies natural language processing to financial texts, reports, and news for sentiment and entity extraction"
  - name: anomaly-detection
    description: "Develops anomaly detection systems for identifying fraud, errors, and unusual financial patterns"
  - name: time-series
    description: "Implements time-series forecasting models (ARIMA, Prophet, LSTM) for financial prediction"
knowledge_paths:
  - G2
  - G3
  - J2
triggers:
  - event: request
    from: [audit-orchestrator, advisory-orchestrator]
    priority: normal
output:
  - ml-model
  - prediction-report
  - anomaly-alert
