# Blueprint: Forensic Accountant — حسابرس دادگاهی
# ============================================================
agent_id: "forensic-accountant"
name:
  fa: "حسابرس دادگاهی"
  en: "Forensic Accountant"
type: specialist
description:
  fa: "کشف تقلب، تحقیقات مالی و ارائه شواهد حسابداری در مراجع قانونی"
  en: "Detects fraud, conducts financial investigations, and provides accounting evidence for legal proceedings"
covers: ["C6.2", "G2"]
skills:
  - name: fraud-detection
    description: "Identifies red flags and indicators of financial fraud using investigative techniques"
  - name: forensic-accounting
    description: "Conducts forensic investigations, computes damages, and prepares expert reports for litigation"
  - name: anomaly-detection
    description: "Applies statistical and data-driven methods to detect unusual patterns and anomalies in financial data"
knowledge_paths:
  - C6.2
  - G2
triggers:
  - event: request
    from: [audit-orchestrator]
    priority: normal
output:
  - forensic-report
  - fraud-investigation-findings
  - evidence-package
