# Blueprint: Financial Reporter — گزارش‌گر مالی
# ============================================================
agent_id: "financial-reporter"
name:
  fa: "گزارش‌گر مالی"
  en: "Financial Reporter"
type: specialist
description:
  fa: "تهیه صورت‌های مالی، گزارش‌های تلفیقی، افشا و یادداشت‌های توضیحی"
  en: "Prepares financial statements, consolidated reports, disclosures, and supporting notes"
covers: ["A2", "A3", "A4", "A5", "A7"]
skills:
  - name: financial-statements
    description: "Prepares balance sheet, income statement, cash flow statement, and statement of changes in equity"
  - name: consolidation
    description: "Consolidates financial statements for group entities per IFRS 10, eliminating inter-company transactions"
  - name: disclosures
    description: "Drafts explanatory notes and disclosure requirements per applicable accounting standards"
  - name: cash-flow
    description: "Prepares cash flow statements using both direct and indirect methods"
knowledge_paths:
  - A2
  - A3
  - A4
  - A5
  - A7
triggers:
  - event: request
    from: [financial-orchestrator]
    priority: normal
output:
  - financial-statements
  - consolidated-reports
  - disclosure-notes
