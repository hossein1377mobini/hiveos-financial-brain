# Blueprint: Internal Controller — کنترل‌گر داخلی
# ============================================================
agent_id: "internal-controller"
name:
  fa: "کنترل‌گر داخلی"
  en: "Internal Controller"
type: specialist
description:
  fa: "طراحی، ارزیابی و بهبود سیستم کنترل داخلی و مدیریت ریسک"
  en: "Designs, evaluates, and improves internal control systems and risk management frameworks"
covers: ["C4", "H1"]
skills:
  - name: internal-control
    description: "Designs and assesses internal control systems including control activities and monitoring"
  - name: coso-framework
    description: "Applies COSO Internal Control — Integrated Framework for comprehensive control evaluation"
  - name: risk-management
    description: "Implements enterprise risk management (ERM) frameworks and risk assessment methodologies"
  - name: compliance
    description: "Ensures compliance with policies, regulations, and internal control requirements"
knowledge_paths:
  - C4
  - H1
triggers:
  - event: request
    from: [audit-orchestrator]
    priority: normal
output:
  - internal-control-report
  - risk-assessment
  - compliance-report
