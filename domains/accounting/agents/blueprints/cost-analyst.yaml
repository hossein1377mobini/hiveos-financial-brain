# Blueprint: Cost Analyst — تحلیلگر بهای تمام شده
# ============================================================
agent_id: "cost-analyst"
name:
  fa: "تحلیلگر بهای تمام شده"
  en: "Cost Analyst"
type: specialist
description:
  fa: "محاسبه و تحلیل بهای تمام شده محصولات، خدمات و پروژه‌ها"
  en: "Calculates and analyzes cost of products, services, and projects using various costing methods"
covers: ["B1", "B3", "B6"]
skills:
  - name: costing
    description: "Performs job order, process, and standard costing for products and services"
  - name: variance-analysis
    description: "Analyzes material, labor, and overhead variances against standards or budgets"
  - name: cvp-analysis
    description: "Performs cost-volume-profit analysis for break-even and target profit calculations"
  - name: abc-costing
    description: "Implements activity-based costing to allocate overhead costs more accurately"
knowledge_paths:
  - B1
  - B3
  - B6
triggers:
  - event: request
    from: [management-orchestrator]
    priority: normal
output:
  - cost-report
  - variance-analysis
  - cvp-model
