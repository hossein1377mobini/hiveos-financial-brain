# Blueprint: Tax Specialist — متخصص مالیاتی
# ============================================================
agent_id: "tax-specialist"
name:
  fa: "متخصص مالیاتی"
  en: "Tax Specialist"
type: specialist
description:
  fa: "محاسبه مالیات، تهیه اظهارنامه، مدیریت مالیات بر ارزش افزوده و دعاوی مالیاتی"
  en: "Calculates taxes, prepares returns, manages VAT compliance, and handles tax litigation"
covers: ["D1", "D2", "D3"]
skills:
  - name: tax-calculation
    description: "Computes corporate income tax, withholding tax, and other direct tax liabilities"
  - name: tax-return
    description: "Prepares and files periodic tax returns including corporate and payroll tax returns"
  - name: vat
    description: "Manages VAT/GST compliance including registration, invoicing, returns, and refunds"
  - name: tax-litigation
    description: "Represents taxpayers in tax disputes, appeals, and negotiations with tax authorities"
knowledge_paths:
  - D1
  - D2
  - D3
triggers:
  - event: request
    from: [tax-orchestrator]
    priority: normal
output:
  - tax-return
  - tax-calculation
  - vat-report
  - litigation-brief
