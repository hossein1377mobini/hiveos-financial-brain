# Blueprint: Master Financial Assistant — دستیار ارشد مالی
# ============================================================
agent_id: "master-financial-assistant"
name:
  fa: "دستیار ارشد مالی"
  en: "Master Financial Assistant"
type: orchestrator
description:
  fa: "ایجنت Orchestrator سطح ۳ — نقطه ورود تمام سوالات مالی و حسابداری"
  en: "Level 3 orchestrator — entry point for all accounting/finance queries"
covers: ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J"]
sub_agents:
  - financial-orchestrator
  - management-orchestrator
  - audit-orchestrator
  - tax-orchestrator
  - advisory-orchestrator
skills:
  - name: query-routing
    description: "Routes incoming queries to the appropriate sub-orchestrator based on intent and domain"
  - name: intent-classification
    description: "Classifies user intent (financial recording, management, audit, tax, or advisory)"
  - name: context-assembly
    description: "Assembles cross-domain context when a query spans multiple accounting sub-domains"
triggers:
  - event: request
    from: [user, system]
    priority: high
output:
  - routed-query
