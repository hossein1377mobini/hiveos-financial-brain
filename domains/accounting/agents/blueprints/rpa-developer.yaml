    description: "Builds automated reconciliation bots for bank, ledger, and inter-company account matching"
  - name: report-automation
    description: "Develops automated report generation workflows for periodic financial reporting"
knowledge_paths:
  - G6
triggers:
  - event: request
    from: [financial-orchestrator]
    priority: normal
output:
  - rpa-bot
  - automation-workflow
  - reconciliation-report
