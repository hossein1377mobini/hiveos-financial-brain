# Blueprint: RPA Developer — توسعه‌دهنده RPA
# ============================================================
agent_id: "rpa-developer"
name:
  fa: "توسعه‌دهنده RPA"
  en: "RPA Developer"
type: specialist
description:
  fa: "طراحی و پیاده‌سازی ربات‌های فرآیندهای مالی خودکار"
  en: "Designs and implements robotic process automation for financial workflows"
covers: ["G6"]
skills:
