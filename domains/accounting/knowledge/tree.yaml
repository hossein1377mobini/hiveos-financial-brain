          - id: "A5.3"
            label:
              fa: "تئوری اثباتی حسابداری (PAT)"
            priority: 3
            children:
              - id: "A5.3.1"
                label:
                  fa: "فرضیه پاداش (Bonus Plan)"
              - id: "A5.3.2"
                label:
                  fa: "فرضیه بدهی (Debt Covenant)"
              - id: "A5.3.3"
                label:
                  fa: "فرضیه هزینه سیاسی (Political Cost)"

          - id: "A5.4"
            label:
              fa: "تحقیقات بازار سرمایه"
            priority: 3
            children:
