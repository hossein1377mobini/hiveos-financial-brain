# ============================================================
# Accounting Knowledge Tree 🌳
# ============================================================
# درخت دانش کامل حسابداری — استخراج شده از سرفصل‌های رسمی
# کارشناسی ۱۴۰۴ و ارشد ۱۴۰۲ وزارت علوم ایران
#
# ساختار:
#   A-Z = شاخه‌های اصلی
#   A1-A9 = زیرشاخه سطح ۱
#   A1.1-A1.9 = زیرشاخه سطح ۲
#   A1.1.1-A1.1.9 = زیرشاخه سطح ۳ (جزئیات)
#
# هر گره می‌تواند دارای:
#   - label: نام فارسی و انگلیسی
#   - description: توضیح مختصر
#   - ref: منابع اطلاعاتی مرتبط
#   - tags: برچسب‌های جستجو
#   - agent_id: ایجنت پیش‌فرضی که این گره را پوشش می‌دهد
#   - priority: اولویت برای پیاده‌سازی (1=فوری, 2=مهم, 3=آینده)
# ============================================================

version: "1.0.0"
domain: "accounting"
label:
  fa: "درخت دانش حسابداری"
  en: "Accounting Knowledge Tree"

nodes:
  # ============================================================
  # [A] FINANCIAL ACCOUNTING & REPORTING | حسابداری مالی و گزارشگری
  # ============================================================
  - id: "A"
    label:
      fa: "حسابداری مالی و گزارشگری"
      en: "Financial Accounting & Reporting"
    description:
      fa: "ثبت، طبقه‌بندی و گزارش رویدادهای مالی بر اساس استانداردهای حسابداری"
      en: "Recording, classifying, and reporting financial events per accounting standards"
    children:

      # ── A1: Transaction Recording ──
      - id: "A1"
        label:
          fa: "ثبت رویدادهای مالی"
          en: "Transaction Recording"
        description:
          fa: "ثبت رویدادهای اقتصادی در دفاتر حسابداری — از اسناد اولیه تا تراز آزمایشی"
        priority: 1
        agent_id: "financial-recorder"
        ref:
          books:
            - "کتاب اصول حسابداری ۱ و ۲"
            - "کتاب حسابداری میانه ۱"
          standards:
            - "IAS 1: Presentation of Financial Statements"
            - "Conceptual Framework for Financial Reporting"
        children:

          - id: "A1.1"
            label:
              fa: "اسناد اولیه و مبانی ثبت"
            priority: 1
            children:
              - id: "A1.1.1"
                label:
                  fa: "معادله حسابداری"
              - id: "A1.1.2"
                label:
                  fa: "حساب‌های دائمی و موقت"
              - id: "A1.1.3"
                label:
                  fa: "ثبت رویدادها در روزنامه"
              - id: "A1.1.4"
                label:
                  fa: "انتقال به دفتر کل"
              - id: "A1.1.5"
                label:
                  fa: "تهیه تراز آزمایشی"

          - id: "A1.2"
            label:
              fa: "اصلاحات و بستن حساب‌ها"
            priority: 1
            children:
              - id: "A1.2.1"
                label:
                  fa: "ثبت اصلاحی (Accruals & Deferrals)"
              - id: "A1.2.2"
                label:
                  fa: "بستن حساب‌های موقت"
              - id: "A1.2.3"
                label:
                  fa: "تراز آزمایشی پس از اصلاح"
              - id: "A1.2.4"
                label:
                  fa: "تهیه صورت‌های مالی پایه"

          - id: "A1.3"
            label:
              fa: "تطبیق حساب‌ها (Reconciliation)"
            priority: 1
            children:
              - id: "A1.3.1"
                label:
                  fa: "تطبیق بانکی"
              - id: "A1.3.2"
                label:
                  fa: "تطبیق حساب‌های دریافتنی"
              - id: "A1.3.3"
                label:
                  fa: "تطبیق موجودی کالا"

      # ── A2: Intermediate Accounting ──
      - id: "A2"
        label:
          fa: "حسابداری میانه"
          en: "Intermediate Accounting"
        description:
          fa: "حسابداری عناصر اصلی صورت‌های مالی — دارایی‌ها، بدهی‌ها، حقوق صاحبان سهام"
        priority: 1
        agent_id: "financial-reporter"
        ref:
          books:
            - "کتاب حسابداری میانه ۱ و ۲"
          standards:
            - "IAS 2: Inventories"
            - "IAS 7: Statement of Cash Flows"
            - "IAS 16: Property, Plant & Equipment"
            - "IAS 36: Impairment of Assets"
            - "IAS 37: Provisions, Contingent Liabilities & Contingent Assets"
        children:

          - id: "A2.1"
            label:
              fa: "وجه نقد و دریافتنی‌ها"
            priority: 1
            children:
              - id: "A2.1.1"
                label:
                  fa: "مدیریت وجه نقد"
              - id: "A2.1.2"
                label:
                  fa: "حساب‌ها و اسناد دریافتنی"
              - id: "A2.1.3"
                label:
                  fa: "ذخیره مطالبات مشکوک‌الوصول"

          - id: "A2.2"
            label:
              fa: "موجودی کالا (Inventory)"
            priority: 1
            children:
              - id: "A2.2.1"
                label:
                  fa: "روش‌های قیمت‌گذاری موجودی (FIFO, LIFO, میانگین)"
              - id: "A2.2.2"
                label:
                  fa: "سیستم ادواری و دائمی"
              - id: "A2.2.3"
                label:
                  fa: "کاهش ارزش موجودی (LCM)"
              - id: "A2.2.4"
                label:
                  fa: "تخمین موجودی (روش ناخالص و خرده‌فروشی)"

          - id: "A2.3"
            label:
              fa: "دارایی‌های ثابت و استهلاک"
            priority: 1
            children:
              - id: "A2.3.1"
                label:
                  fa: "شناسایی و اندازه‌گیری اولیه"
              - id: "A2.3.2"
                label:
                  fa: "روش‌های استهلاک (خط مستقیم، نزولی، مجموع سنوات)"
              - id: "A2.3.3"
                label:
                  fa: "تجدید ارزیابی و کاهش ارزش"
              - id: "A2.3.4"
                label:
                  fa: "مخارج بعد از تحصیل (تعمیرات اساسی)"

          - id: "A2.4"
            label:
              fa: "دارایی‌های نامشهود"
            priority: 2
            children:
              - id: "A2.4.1"
                label:
                  fa: "شناسایی و اندازه‌گیری"
              - id: "A2.4.2"
                label:
                  fa: "استهلاک و کاهش ارزش دارایی‌های نامشهود"
              - id: "A2.4.3"
                label:
                  fa: "سرقفلی (Goodwill)"
              - id: "A2.4.4"
                label:
                  fa: "تحقیق و توسعه"

          - id: "A2.5"
            label:
              fa: "بدهی‌ها و ذخایر"
            priority: 1
            children:
              - id: "A2.5.1"
                label:
                  fa: "بدهی‌های جاری"
              - id: "A2.5.2"
                label:
                  fa: "بدهی‌های بلندمدت و اوراق قرضه"
              - id: "A2.5.3"
                label:
                  fa: "ذخایر و بدهی‌های احتمالی"
              - id: "A2.5.4"
                label:
                  fa: "اجاره‌ها (Leases) — IFRS 16"

          - id: "A2.6"
            label:
              fa: "حقوق صاحبان سهام"
            priority: 1
            children:
              - id: "A2.6.1"
                label:
                  fa: "سرمایه و انواع سهام"
              - id: "A2.6.2"
                label:
                  fa: "سود انباشته و اندوخته‌ها"
              - id: "A2.6.3"
                label:
                  fa: "سود تقسیمی (Dividends)"
              - id: "A2.6.4"
                label:
                  fa: "خرید سهام و سود هر سهم (EPS)"
              - id: "A2.6.5"
                label:
                  fa: "سود جامع (Other Comprehensive Income)"

          - id: "A2.7"
            label:
              fa: "شناسایی درآمد"
            priority: 1
            children:
              - id: "A2.7.1"
                label:
                  fa: "مدل ۵ مرحله‌ای شناسایی درآمد — IFRS 15"
              - id: "A2.7.2"
                label:
                  fa: "قراردادهای بلندمدت (درصد پیشرفت)"
              - id: "A2.7.3"
                label:
                  fa: "فروش اقساطی و نسیه"

      # ── A3: Advanced Accounting ──
      - id: "A3"
