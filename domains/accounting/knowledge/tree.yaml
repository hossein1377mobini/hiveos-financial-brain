      # ── A4: Financial Statements ──
      - id: "A4"
        label:
          fa: "صورت‌های مالی"
          en: "Financial Statements"
        priority: 1
        agent_id: "financial-reporter"
        children:

          - id: "A4.1"
            label:
              fa: "ترازنامه (Balance Sheet)"
          - id: "A4.2"
            label:
              fa: "صورت سود و زیان"
          - id: "A4.3"
