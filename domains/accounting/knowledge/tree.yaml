            - "IFRS 10: Consolidated Financial Statements"
            - "IAS 21: Foreign Exchange"
        children:

          - id: "A3.1"
            label:
              fa: "صورت‌های مالی تلفیقی"
            priority: 2
            children:
              - id: "A3.1.1"
                label:
                  fa: "روش خرید و تلفیق کامل"
              - id: "A3.1.2"
                label:
                  fa: "سهم اقلیت و عدم کنترل"
              - id: "A3.1.3"
                label:
                  fa: "حذف معاملات درون‌گروهی"
              - id: "A3.1.4"
                label:
                  fa: "روش ارزش ویژه در سرمایه‌گذاری"

          - id: "A3.2"
            label:
              fa: "حسابداری ارز خارجی"
            priority: 3
            children:
              - id: "A3.2.1"
                label:
                  fa: "تبدیل ارز و تفاوت نرخ"
              - id: "A3.2.2"
                label:
                  fa: "عملیات خارجی — IAS 21"

          - id: "A3.3"
            label:
              fa: "حسابداری مشارکت‌ها"
            priority: 3
            children:
              - id: "A3.3.1"
                label:
                  fa: "شرکت‌های تضامنی و سهامی خاص"
              - id: "A3.3.2"
                label:
                  fa: "انحلال و تصفیه"

          - id: "A3.4"
            label:
              fa: "ترکیب واحدهای تجاری"
            priority: 2
            children:
              - id: "A3.4.1"
                label:
                  fa: "شناسایی و اندازه‌گیری — IFRS 3"
              - id: "A3.4.2"
                label:
