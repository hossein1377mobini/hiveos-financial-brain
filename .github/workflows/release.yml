name: Release — Build & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test (non-blocking)
        id: test
        continue-on-error: true
        run: |
          pip install -e . 2>&1
          pip install pytest 2>&1
          python -m pytest tests/ -v --tb=short 2>&1 | tail -20
        shell: pwsh

      - name: Install build deps
        run: |
          pip install -e .
          pip install pyinstaller
          pip install pywebview
        shell: pwsh

      - name: Build .exe (PyInstaller)
        run: python build/build_exe.py
        env:
          PYTHONOPTIMIZE: 1
        shell: pwsh

      - name: Install Inno Setup (Chocolatey)
        run: choco install innosetup -y --no-progress --allow-empty-checksums
        shell: pwsh

      - name: Refresh PATH
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          $isccPath = Get-Command iscc.exe -ErrorAction SilentlyContinue
          if (-not $isccPath) {
            $paths = @(
              "${env:ProgramFiles}\Inno Setup 6",
              "${env:ProgramFiles(x86)}\Inno Setup 6",
              "${env:LOCALAPPDATA}\Programs\Inno Setup 6"
            )
            foreach ($p in $paths) {
              if (Test-Path "$p\iscc.exe") {
                Write-Host "Found iscc at $p"
                echo "$p" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
                break
              }
            }
          }
        shell: pwsh

      - name: Build MSI Installer
        run: |
          $iscc = Get-Command iscc.exe -ErrorAction SilentlyContinue
          if (-not $iscc) {
            # Try common paths
            $candidates = @(
              "${env:ProgramFiles}\Inno Setup 6\iscc.exe",
              "${env:ProgramFiles(x86)}\Inno Setup 6\iscc.exe",
              "${env:LOCALAPPDATA}\Programs\Inno Setup 6\iscc.exe"
            )
            $isccPath = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
            if (-not $isccPath) {
              Write-Warning "iscc.exe not found, skipping MSI build"
              return
            }
            & $isccPath "build\installer.iss"
          } else {
            & $iscc "build\installer.iss"
          }
          # Check if MSI was created
          Get-ChildItem -Path dist\ -Filter "HiveOS-Setup-*" -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "✅ MSI created: $($_.Name) ($([math]::Round($_.Length/1MB,1)) MB)"
          }
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HiveOS-Setup
          path: |
            dist\HiveOS-Setup-*.exe
            dist\HiveOS\HiveOS.exe
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: HiveOS-Setup
          path: dist

      - name: Display build artifacts
        run: |
          ls -la dist/
          ls -la dist/ | grep -c "HiveOS" && echo "✅ Found artifacts" || echo "⚠️ No artifacts found"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: HiveOS ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            dist/HiveOS-Setup-*.exe
            dist/HiveOS.exe
          fail_on_unmatched_files: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
