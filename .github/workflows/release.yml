name: Release — Build & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install HiveOS + build deps
        run: |
          pip install -e .
          pip install pyinstaller pywebview

      - name: Build .exe (PyInstaller)
        shell: bash
        env:
          PYTHONOPTIMIZE: 2
        run: |
          pyinstaller --noconfirm --clean --onedir --name=HiveOS \
            --distpath=dist --workpath=build/pyinstaller --specpath=build \
            --exclude-module=pythoncom --exclude-module=pywin32 \
            --collect-all=hiveos \
            --add-data="domains;domains" \
            --windowed \
            src/hiveos/desktop/app.py

      - name: Verify build
        run: |
          if (Test-Path "dist\HiveOS\HiveOS.exe") {
            $size = [math]::Round((Get-Item "dist\HiveOS\HiveOS.exe").Length / 1MB, 1)
            Write-Host "✅ HiveOS.exe built: $size MB"
            Get-ChildItem -Recurse dist\HiveOS\ | Measure-Object | % { Write-Host "   Total files: $($_.Count)" }
          } else {
            Write-Error "❌ HiveOS.exe not found!"
            exit 1
          }
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
        shell: pwsh

      - name: Build MSI Installer
        run: |
          $iscc = Get-Command iscc.exe -ErrorAction SilentlyContinue
          if (-not $iscc) {
            "${env:ProgramFiles(x86)}\Inno Setup 6",
            "${env:ProgramFiles}\Inno Setup 6",
            "${env:LOCALAPPDATA}\Programs\Inno Setup 6" | ForEach-Object {
              if (Test-Path "$_\iscc.exe") {
                Write-Host "Found iscc at $_"
                return
              }
            }
          }
          iscc.exe build\installer.iss
          if ($LASTEXITCODE -ne 0) { Write-Warning "MSI build had warnings, checking output..." }
          Get-ChildItem dist\ -Filter "HiveOS-Setup-*" | ForEach-Object {
            Write-Host "✅ MSI: $($_.Name) ($([math]::Round($_.Length/1MB,1)) MB)"
          }
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HiveOS-Setup
          path: |
            dist\HiveOS-Setup-*.exe
            dist\HiveOS\HiveOS.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: HiveOS-Setup
          path: dist

      - name: Display build artifacts
        run: |
          ls -la dist/
          ls -la dist/HiveOS/ 2>/dev/null || echo "No HiveOS dir"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: HiveOS Desktop ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            dist/HiveOS-Setup-*.exe
            dist/HiveOS.exe
          fail_on_unmatched_files: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
