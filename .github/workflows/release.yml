name: Release — Build & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install HiveOS + build deps
        run: pip install -e . pyinstaller
        shell: pwsh

      - name: Build .exe via build_exe.py (CI mode)
        shell: pwsh
        run: |
          python build/build_exe.py --ci
          Write-Host "build_exe.py exit code: $LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) { throw "build_exe.py failed" }

      - name: Verify build
        shell: pwsh
        run: |
          if (Test-Path "dist\HiveOS\HiveOS.exe") {
            $size = [math]::Round((Get-Item "dist\HiveOS\HiveOS.exe").Length / 1MB, 1)
            Write-Host "✅ HiveOS.exe built: $size MB"
            Get-ChildItem -Recurse dist\HiveOS\ | Measure-Object | % { Write-Host "   Total files: $($_.Count)" }
          } else {
            Write-Error "❌ HiveOS.exe not found!"
            exit 1
          }

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
        shell: pwsh

      - name: Build MSI Installer
        shell: pwsh
        run: |
          iscc.exe build\installer.iss
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "iscc exit code: $LASTEXITCODE — checking output anyway"
          }
          Get-ChildItem dist\ -Filter "HiveOS-Setup-*" | ForEach-Object {
            Write-Host "✅ MSI: $($_.Name) ($([math]::Round($_.Length/1MB,1)) MB)"
          }

      # Optional: Code Signing — uncomment when you have a certificate
      # See docs/CODE_SIGNING.md for setup instructions
      # - name: Sign executables
      #   shell: pwsh
      #   run: |
      #     signtool sign /fd SHA256 /a /tr http://timestamp.digicert.com /td SHA256 `
      #       dist\HiveOS\HiveOS.exe
      #     signtool sign /fd SHA256 /a /tr http://timestamp.digicert.com /td SHA256 `
      #       dist\HiveOS-Setup-*.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HiveOS-Setup
          path: |
            dist\HiveOS-Setup-*.exe
            dist\HiveOS\HiveOS.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: HiveOS-Setup
          path: dist

      - name: Display build artifacts
        run: |
          ls -la dist/
          ls -la dist/HiveOS/ 2>/dev/null || echo "No HiveOS dir"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: HiveOS Desktop ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            dist/HiveOS-Setup-*.exe
            dist/HiveOS/HiveOS.exe
          fail_on_unmatched_files: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
