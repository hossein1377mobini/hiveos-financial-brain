<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0e15"/>
      <stop offset="100%" stop-color="#07080c"/>
    </linearGradient>
    <linearGradient id="hex" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5b723"/>
      <stop offset="100%" stop-color="#c4890e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(245,183,35,0.2)"/>
      <stop offset="100%" stop-color="rgba(245,183,35,0.05)"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <ellipse cx="256" cy="256" rx="180" ry="180" fill="url(#glow)"/>
  <!-- Hexagon -->
  <polygon points="256,120 380,184 380,328 256,392 132,328 132,184" fill="none" stroke="url(#hex)" stroke-width="12" stroke-linejoin="round"/>
  <!-- Horizontal stripes -->
  <rect x="180" y="242" width="152" height="8" rx="4" fill="#f5b723" opacity="0.9"/>
  <rect x="210" y="220" width="92" height="8" rx="4" fill="#f5b723" opacity="0.6"/>
  <rect x="200" y="264" width="112" height="8" rx="4" fill="#f5b723" opacity="0.6"/>
  <rect x="230" y="198" width="52" height="8" rx="4" fill="#f5b723" opacity="0.3"/>
  <rect x="220" y="286" width="72" height="8" rx="4" fill="#f5b723" opacity="0.3"/>
  <!-- Small bee details -->
  <circle cx="256" cy="310" r="5" fill="#f5b723" opacity="0.4"/>
  <circle cx="256" cy="202" r="5" fill="#f5b723" opacity="0.4"/>
</svg>
